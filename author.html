<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的地圖 - W3X 地圖庫</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .header {
            background: #16213e;
            padding: 20px;
            border-bottom: 2px solid #0f3460;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #e94560;
            font-size: 1.6em;
        }
        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .nav-link {
            color: #888;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .nav-link:hover { color: #e94560; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid #0f3460;
        }
        .stat-value {
            font-size: 2em;
            color: #e94560;
            font-weight: bold;
        }
        .stat-label {
            color: #888;
            font-size: 14px;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #0f3460;
        }
        .section-title {
            font-size: 1.2em;
            color: #e94560;
            margin-bottom: 20px;
        }
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .search-input {
            padding: 10px 15px;
            background: #1a1a2e;
            border: 2px solid #0f3460;
            border-radius: 6px;
            color: #fff;
            width: 300px;
        }
        .search-input:focus { border-color: #e94560; outline: none; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:hover { background: #ff6b6b; }
        .btn-danger { background: #991b1b; color: #fca5a5; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #0f3460; color: #e94560; border: 1px solid #e94560; }
        .btn-secondary:hover { background: #e94560; color: #fff; }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th, .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }
        .table th {
            color: #888;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
        }
        .table tr:hover {
            background: rgba(233, 69, 96, 0.05);
        }
        .checkbox-cell {
            width: 40px;
        }
        .checkbox-cell input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .selected-count {
            color: #888;
            font-size: 14px;
        }
        .pin-indicator {
            color: #e94560;
            font-size: 14px;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        .empty-state h3 {
            margin-bottom: 10px;
            color: #888;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: #166534; }
        .toast-error { background: #991b1b; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .login-required {
            text-align: center;
            padding: 100px 20px;
        }
        .login-required h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .map-preview {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            background: #0f3460;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background: #16213e;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #0f3460;
            text-align: center;
            min-width: 280px;
        }
        .modal h3 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .version-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .version-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #0f3460;
            color: #e94560;
            border: 2px solid #e94560;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .version-btn:hover {
            background: #e94560;
            color: #fff;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>我的地圖</h1>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">返回首頁</a>
                <span id="authorUser" style="color: #888;"></span>
            </nav>
        </div>
    </header>

    <main class="container" id="mainContent">
        <div class="login-required" id="loginRequired">
            <h2>需要登入</h2>
            <p style="color: #888; margin-bottom: 20px;">請先登入作者帳號</p>
            <a href="index.html" class="btn btn-primary">返回首頁登入</a>
        </div>

        <div id="authorPanel" style="display: none;">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalMaps">0</div>
                    <div class="stat-label">上傳地圖數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalDownloads">0</div>
                    <div class="stat-label">總下載次數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pinnedCount">0</div>
                    <div class="stat-label">置頂中</div>
                </div>
            </div>

            <div class="card">
                <h3 class="section-title">我的地圖列表</h3>
                <div class="action-bar">
                    <input type="text" class="search-input" id="mapSearch" placeholder="搜尋地圖...">
                    <button class="btn btn-danger" id="batchDeleteBtn" disabled>批量刪除</button>
                    <span class="selected-count" id="selectedCount">已選 0 項</span>
                </div>

                <table class="table" id="mapsTable">
                    <thead>
                        <tr>
                            <th class="checkbox-cell">
                                <input type="checkbox" id="selectAll">
                            </th>
                            <th>預覽</th>
                            <th>地圖名稱</th>
                            <th>檔案名稱</th>
                            <th>下載次數</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="mapsList"></tbody>
                </table>
                <div class="empty-state" id="mapsEmpty" style="display: none;">
                    <h3>還沒有上傳任何地圖</h3>
                    <p>回到首頁上傳你的第一張地圖吧！</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Version Selection Modal -->
    <div class="modal-overlay" id="versionModal" style="display: none;">
        <div class="modal">
            <h3>選擇遊戲版本</h3>
            <div class="version-buttons">
                <button class="version-btn" onclick="openHostRoom('1.28')">1.28</button>
                <button class="version-btn" onclick="openHostRoom('1.29')">1.29</button>
            </div>
            <button class="btn btn-secondary" onclick="closeVersionModal()">取消</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://w3i.lantw.org';
        const R2_PUBLIC_URL = 'https://w3x.lantw.org';

        // Auth
        function getToken() {
            return localStorage.getItem('token');
        }

        function authHeaders() {
            const token = getToken();
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Check auth
        async function checkAuth() {
            const token = getToken();
            if (!token) {
                document.getElementById('loginRequired').style.display = 'block';
                document.getElementById('authorPanel').style.display = 'none';
                return false;
            }

            try {
                const res = await fetch(`${API_BASE}/api/auth/me`, { headers: authHeaders() });
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('authorUser').textContent = `${user.username}`;
                    document.getElementById('loginRequired').style.display = 'none';
                    document.getElementById('authorPanel').style.display = 'block';
                    return true;
                }
            } catch {}

            document.getElementById('loginRequired').style.display = 'block';
            document.getElementById('authorPanel').style.display = 'none';
            return false;
        }

        // Load maps
        let allMaps = [];
        let selectedMaps = new Set();

        async function loadMaps() {
            try {
                const res = await fetch(`${API_BASE}/api/author/maps`, { headers: authHeaders() });
                if (res.ok) {
                    allMaps = await res.json();
                    updateStats();
                    renderMaps(allMaps);
                }
            } catch (e) {
                console.error('Failed to load maps:', e);
            }
        }

        function updateStats() {
            document.getElementById('totalMaps').textContent = allMaps.length;
            document.getElementById('totalDownloads').textContent = allMaps.reduce((sum, m) => sum + m.download_count, 0);
            document.getElementById('pinnedCount').textContent = allMaps.filter(m => m.pinned).length;
        }

        function renderMaps(maps) {
            const tbody = document.getElementById('mapsList');
            const empty = document.getElementById('mapsEmpty');
            const table = document.getElementById('mapsTable');

            if (maps.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                table.style.display = 'none';
                return;
            }

            empty.style.display = 'none';
            table.style.display = 'table';
            tbody.innerHTML = maps.map(map => `
                <tr>
                    <td class="checkbox-cell">
                        <input type="checkbox" class="map-checkbox" data-id="${map.id}" ${selectedMaps.has(map.id) ? 'checked' : ''}>
                    </td>
                    <td>
                        <img src="${R2_PUBLIC_URL}/maps/${map.id}/preview.png" class="map-preview" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect fill=%22%230f3460%22 width=%2240%22 height=%2240%22/></svg>'">
                    </td>
                    <td>${map.name}</td>
                    <td>${map.filename}</td>
                    <td>${map.download_count}</td>
                    <td>${map.pinned ? '<span class="pin-indicator">置頂</span>' : '-'}</td>
                    <td>
                        <button class="btn btn-primary" onclick="showVersionModal('${map.id}', \`${map.filename.replace(/`/g, '\\`')}\`)">官方開房</button>
                        <button class="btn btn-secondary" onclick="togglePin('${map.id}')">${map.pinned ? '取消置頂' : '置頂'}</button>
                        <button class="btn btn-danger" onclick="deleteMap('${map.id}')">刪除</button>
                    </td>
                </tr>
            `).join('');

            // Add checkbox listeners
            document.querySelectorAll('.map-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedMaps.add(e.target.dataset.id);
                    } else {
                        selectedMaps.delete(e.target.dataset.id);
                    }
                    updateSelectedCount();
                });
            });
        }

        function updateSelectedCount() {
            const count = selectedMaps.size;
            document.getElementById('selectedCount').textContent = `已選 ${count} 項`;
            document.getElementById('batchDeleteBtn').disabled = count === 0;
        }

        // Select all
        document.getElementById('selectAll').addEventListener('change', (e) => {
            const checkboxes = document.querySelectorAll('.map-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                if (e.target.checked) {
                    selectedMaps.add(cb.dataset.id);
                } else {
                    selectedMaps.delete(cb.dataset.id);
                }
            });
            updateSelectedCount();
        });

        // Map search
        document.getElementById('mapSearch').addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            if (!query) {
                renderMaps(allMaps);
            } else {
                const filtered = allMaps.filter(m =>
                    m.name.toLowerCase().includes(query) ||
                    m.filename.toLowerCase().includes(query)
                );
                renderMaps(filtered);
            }
        });

        // Toggle pin
        async function togglePin(id) {
            try {
                const res = await fetch(`${API_BASE}/api/author/maps/${id}/pin`, {
                    method: 'PUT',
                    headers: authHeaders()
                });

                if (res.ok) {
                    showToast('已更新置頂狀態');
                    loadMaps();
                } else {
                    const err = await res.text();
                    showToast(err || '操作失敗', 'error');
                }
            } catch {
                showToast('操作失敗', 'error');
            }
        }

        // Delete single map
        async function deleteMap(id) {
            if (!confirm('確定要刪除這張地圖嗎？此操作無法復原！')) return;

            try {
                const res = await fetch(`${API_BASE}/api/author/maps/${id}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });

                if (res.ok) {
                    showToast('地圖已刪除');
                    selectedMaps.delete(id);
                    updateSelectedCount();
                    loadMaps();
                } else {
                    showToast('刪除失敗', 'error');
                }
            } catch {
                showToast('刪除失敗', 'error');
            }
        }

        // Host room functionality
        let currentHostMap = null;

        function showVersionModal(mapId, filename) {
            currentHostMap = { id: mapId, filename: filename };
            document.getElementById('versionModal').style.display = 'flex';
        }

        function closeVersionModal() {
            document.getElementById('versionModal').style.display = 'none';
            currentHostMap = null;
        }

        function openHostRoom(version) {
            if (!currentHostMap) return;

            const mapUrl = `${R2_PUBLIC_URL}/maps/${currentHostMap.id}/${encodeURIComponent(currentHostMap.filename)}`;
            const baseUrl = version === '1.28'
                ? 'http://125.228.62.114:6889/?url='
                : 'http://125.228.62.114:6888/?url=';

            window.open(baseUrl + encodeURIComponent(mapUrl), '_blank');
            closeVersionModal();
        }

        // Close modal when clicking overlay
        document.getElementById('versionModal').addEventListener('click', (e) => {
            if (e.target.id === 'versionModal') {
                closeVersionModal();
            }
        });

        // Batch delete
        document.getElementById('batchDeleteBtn').addEventListener('click', async () => {
            if (selectedMaps.size === 0) return;
            if (!confirm(`確定要刪除 ${selectedMaps.size} 張地圖嗎？此操作無法復原！`)) return;

            let deleted = 0;
            for (const id of selectedMaps) {
                try {
                    const res = await fetch(`${API_BASE}/api/author/maps/${id}`, {
                        method: 'DELETE',
                        headers: authHeaders()
                    });
                    if (res.ok) deleted++;
                } catch {}
            }

            showToast(`已刪除 ${deleted} 張地圖`);
            selectedMaps.clear();
            updateSelectedCount();
            document.getElementById('selectAll').checked = false;
            loadMaps();
        });

        // Initialize
        async function init() {
            const isAuth = await checkAuth();
            if (isAuth) {
                loadMaps();
            }
        }

        init();
    </script>
</body>
</html>
