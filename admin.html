<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W3X 管理後台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .header {
            background: #16213e;
            padding: 20px;
            border-bottom: 2px solid #0f3460;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #e94560;
            font-size: 1.6em;
        }
        .nav-links {
            display: flex;
            gap: 15px;
        }
        .nav-link {
            color: #888;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .nav-link:hover { color: #e94560; }
        .nav-link.active { background: #0f3460; color: #e94560; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #0f3460;
            padding-bottom: 15px;
        }
        .tab {
            padding: 10px 20px;
            background: transparent;
            color: #888;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab:hover { border-color: #e94560; color: #e94560; }
        .tab.active { background: #e94560; color: #fff; border-color: #e94560; }
        .panel { display: none; }
        .panel.active { display: block; }
        .section-title {
            font-size: 1.2em;
            color: #e94560;
            margin-bottom: 20px;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #888;
            font-size: 14px;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 10px 12px;
            background: #1a1a2e;
            border: 2px solid #0f3460;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        .form-input:focus, .form-select:focus {
            border-color: #e94560;
            outline: none;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:hover { background: #ff6b6b; }
        .btn-danger { background: #991b1b; color: #fca5a5; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #0f3460; color: #e94560; border: 1px solid #e94560; }
        .btn-secondary:hover { background: #e94560; color: #fff; }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th, .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }
        .table th {
            color: #888;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
        }
        .table tr:hover {
            background: rgba(233, 69, 96, 0.05);
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-admin { background: #e94560; color: #fff; }
        .badge-author { background: #4ade80; color: #000; }
        .checkbox-cell {
            width: 40px;
        }
        .checkbox-cell input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .selected-count {
            color: #888;
            font-size: 14px;
        }
        .search-input {
            padding: 10px 15px;
            background: #1a1a2e;
            border: 2px solid #0f3460;
            border-radius: 6px;
            color: #fff;
            width: 300px;
        }
        .search-input:focus { border-color: #e94560; outline: none; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: #166534; }
        .toast-error { background: #991b1b; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .pin-indicator {
            color: #e94560;
            font-size: 14px;
        }
        .login-required {
            text-align: center;
            padding: 100px 20px;
        }
        .login-required h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>W3X 管理後台</h1>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">返回首頁</a>
                <span id="adminUser" style="color: #888;"></span>
            </nav>
        </div>
    </header>

    <main class="container" id="mainContent">
        <div class="login-required" id="loginRequired">
            <h2>需要管理員登入</h2>
            <p style="color: #888; margin-bottom: 20px;">請先登入管理員帳號</p>
            <a href="index.html" class="btn btn-primary">返回首頁登入</a>
        </div>

        <div id="adminPanel" style="display: none;">
            <div class="tabs">
                <button class="tab active" data-panel="users">用戶管理</button>
                <button class="tab" data-panel="maps">地圖管理</button>
                <button class="tab" data-panel="rooms">房間管理</button>
            </div>

            <!-- Users Panel -->
            <div class="panel active" id="usersPanel">
                <div class="card">
                    <h3 class="section-title">新增用戶</h3>
                    <form id="createUserForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>用戶名</label>
                                <input type="text" class="form-input" id="newUsername" required>
                            </div>
                            <div class="form-group">
                                <label>密碼</label>
                                <input type="password" class="form-input" id="newPassword" required>
                            </div>
                            <div class="form-group">
                                <label>角色</label>
                                <select class="form-select" id="newRole">
                                    <option value="author">作者</option>
                                    <option value="admin">管理員</option>
                                </select>
                            </div>
                            <div class="form-group" style="display: flex; align-items: flex-end;">
                                <button type="submit" class="btn btn-primary">新增</button>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="card">
                    <h3 class="section-title">用戶列表</h3>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>用戶名</th>
                                <th>角色</th>
                                <th>建立時間</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersList"></tbody>
                    </table>
                </div>
            </div>

            <!-- Maps Panel -->
            <div class="panel" id="mapsPanel">
                <div class="action-bar">
                    <input type="text" class="search-input" id="mapSearch" placeholder="搜尋地圖...">
                    <button class="btn btn-danger" id="batchDeleteBtn" disabled>批量刪除</button>
                    <span class="selected-count" id="selectedCount">已選 0 項</span>
                </div>

                <div class="card">
                    <table class="table">
                        <thead>
                            <tr>
                                <th class="checkbox-cell">
                                    <input type="checkbox" id="selectAll">
                                </th>
                                <th>地圖名稱</th>
                                <th>檔案名稱</th>
                                <th>上傳者</th>
                                <th>下載次數</th>
                                <th>狀態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="mapsList"></tbody>
                    </table>
                    <div class="empty-state" id="mapsEmpty" style="display: none;">
                        沒有地圖
                    </div>
                </div>
            </div>

            <!-- Rooms Panel -->
            <div class="panel" id="roomsPanel">
                <div class="action-bar">
                    <button class="btn btn-primary" id="refreshRoomsBtn">重新整理</button>
                    <span style="color:#888; margin-left:12px;" id="roomsStatus"></span>
                </div>
                <div class="card">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>房間名</th>
                                <th>地圖</th>
                                <th>狀態</th>
                                <th>VPN IP</th>
                                <th>建立時間</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="roomsList"></tbody>
                    </table>
                    <div class="empty-state" id="roomsEmpty" style="display: none;">
                        沒有房間
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'https://w3i.lantw.org';
        const HOST_API = `${API_BASE}/api/host`;
        const mapNameCache = new Map();   // map_id -> name

        // Auth
        function getToken() {
            return localStorage.getItem('token');
        }

        function authHeaders() {
            const token = getToken();
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Check admin auth
        async function checkAdminAuth() {
            const token = getToken();
            if (!token) {
                document.getElementById('loginRequired').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
                return false;
            }

            try {
                const res = await fetch(`${API_BASE}/api/auth/me`, { headers: authHeaders() });
                if (res.ok) {
                    const user = await res.json();
                    if (user.role !== 'admin') {
                        document.getElementById('loginRequired').innerHTML = `
                            <h2>權限不足</h2>
                            <p style="color: #888; margin-bottom: 20px;">需要管理員權限</p>
                            <a href="index.html" class="btn btn-primary">返回首頁</a>
                        `;
                        return false;
                    }
                    document.getElementById('adminUser').textContent = `${user.username} (管理員)`;
                    document.getElementById('loginRequired').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    return true;
                }
            } catch {}

            document.getElementById('loginRequired').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            return false;
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.panel + 'Panel').classList.add('active');
            });
        });

        // Load users
        async function loadUsers() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/users`, { headers: authHeaders() });
                if (res.ok) {
                    const users = await res.json();
                    renderUsers(users);
                }
            } catch (e) {
                console.error('Failed to load users:', e);
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersList');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.username}</td>
                    <td><span class="badge badge-${user.role}">${user.role === 'admin' ? '管理員' : '作者'}</span></td>
                    <td>${new Date(user.created_at).toLocaleDateString('zh-TW')}</td>
                    <td>
                        <button class="btn btn-danger" onclick="deleteUser('${user.id}')" ${user.role === 'admin' ? 'disabled title="無法刪除管理員"' : ''}>刪除</button>
                    </td>
                </tr>
            `).join('');
        }

        // Create user
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;

            try {
                const res = await fetch(`${API_BASE}/api/admin/users`, {
                    method: 'POST',
                    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });

                if (res.ok) {
                    showToast('用戶建立成功');
                    document.getElementById('createUserForm').reset();
                    loadUsers();
                } else {
                    const err = await res.text();
                    showToast(err || '建立失敗', 'error');
                }
            } catch {
                showToast('建立失敗', 'error');
            }
        });

        // Delete user
        async function deleteUser(id) {
            if (!confirm('確定要刪除這個用戶嗎？')) return;

            try {
                const res = await fetch(`${API_BASE}/api/admin/users/${id}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });

                if (res.ok) {
                    showToast('用戶已刪除');
                    loadUsers();
                } else {
                    showToast('刪除失敗', 'error');
                }
            } catch {
                showToast('刪除失敗', 'error');
            }
        }

        // Load maps
        let allMaps = [];
        let selectedMaps = new Set();

        async function loadMaps(query = '') {
            try {
                const url = query ? `${API_BASE}/api/maps?q=${encodeURIComponent(query)}&limit=100` : `${API_BASE}/api/maps?limit=100`;
                const res = await fetch(url);
                if (res.ok) {
                    const data = await res.json();
                    allMaps = data.maps;
                    renderMaps(allMaps);
                }
            } catch (e) {
                console.error('Failed to load maps:', e);
            }
        }

        function renderMaps(maps) {
            const tbody = document.getElementById('mapsList');
            const empty = document.getElementById('mapsEmpty');

            if (maps.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            tbody.innerHTML = maps.map(map => `
                <tr>
                    <td class="checkbox-cell">
                        <input type="checkbox" class="map-checkbox" data-id="${map.id}" ${selectedMaps.has(map.id) ? 'checked' : ''}>
                    </td>
                    <td>${map.name}</td>
                    <td>${map.filename}</td>
                    <td>${map.uploader_name || '匿名'}</td>
                    <td>${map.download_count}</td>
                    <td>${map.pinned ? '<span class="pin-indicator">置頂</span>' : '-'}</td>
                    <td>
                        <button class="btn btn-secondary" onclick="togglePin('${map.id}')">${map.pinned ? '取消置頂' : '置頂'}</button>
                        <button class="btn btn-danger" onclick="deleteMap('${map.id}')">刪除</button>
                    </td>
                </tr>
            `).join('');

            // Add checkbox listeners
            document.querySelectorAll('.map-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedMaps.add(e.target.dataset.id);
                    } else {
                        selectedMaps.delete(e.target.dataset.id);
                    }
                    updateSelectedCount();
                });
            });
        }

        function updateSelectedCount() {
            const count = selectedMaps.size;
            document.getElementById('selectedCount').textContent = `已選 ${count} 項`;
            document.getElementById('batchDeleteBtn').disabled = count === 0;
        }

        // Select all
        document.getElementById('selectAll').addEventListener('change', (e) => {
            const checkboxes = document.querySelectorAll('.map-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                if (e.target.checked) {
                    selectedMaps.add(cb.dataset.id);
                } else {
                    selectedMaps.delete(cb.dataset.id);
                }
            });
            updateSelectedCount();
        });

        // Map search
        let mapSearchTimer;
        document.getElementById('mapSearch').addEventListener('input', (e) => {
            clearTimeout(mapSearchTimer);
            mapSearchTimer = setTimeout(() => {
                loadMaps(e.target.value.trim());
            }, 300);
        });

        // Toggle pin
        async function togglePin(id) {
            try {
                const res = await fetch(`${API_BASE}/api/admin/maps/${id}/pin`, {
                    method: 'PUT',
                    headers: authHeaders()
                });

                if (res.ok) {
                    showToast('已更新置頂狀態');
                    loadMaps(document.getElementById('mapSearch').value.trim());
                }
            } catch {
                showToast('操作失敗', 'error');
            }
        }

        // Delete single map
        async function deleteMap(id) {
            if (!confirm('確定要刪除這張地圖嗎？')) return;

            try {
                const res = await fetch(`${API_BASE}/api/admin/maps`, {
                    method: 'DELETE',
                    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: [id] })
                });

                if (res.ok) {
                    showToast('地圖已刪除');
                    loadMaps(document.getElementById('mapSearch').value.trim());
                }
            } catch {
                showToast('刪除失敗', 'error');
            }
        }

        // Batch delete
        document.getElementById('batchDeleteBtn').addEventListener('click', async () => {
            if (selectedMaps.size === 0) return;
            if (!confirm(`確定要刪除 ${selectedMaps.size} 張地圖嗎？`)) return;

            try {
                const res = await fetch(`${API_BASE}/api/admin/maps`, {
                    method: 'DELETE',
                    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: Array.from(selectedMaps) })
                });

                if (res.ok) {
                    const result = await res.json();
                    showToast(`已刪除 ${result.deleted} 張地圖`);
                    selectedMaps.clear();
                    updateSelectedCount();
                    document.getElementById('selectAll').checked = false;
                    loadMaps(document.getElementById('mapSearch').value.trim());
                }
            } catch {
                showToast('批量刪除失敗', 'error');
            }
        });

        // Rooms (bridge admin)
        async function fetchMapName(mapId) {
            if (!mapId) return '(unknown)';
            if (mapNameCache.has(mapId)) return mapNameCache.get(mapId);
            try {
                const r = await fetch(`${API_BASE}/api/maps/${mapId}`);
                if (r.ok) {
                    const m = await r.json();
                    mapNameCache.set(mapId, m.name || mapId);
                    return mapNameCache.get(mapId);
                }
            } catch {}
            return mapId;
        }

        function statusBadge(s) {
            const colors = { running: '#2ecc71', starting: '#f39c12', stopped: '#888', crashed: '#e94560', failed: '#e94560' };
            const c = colors[s] || '#888';
            return `<span style="display:inline-block;padding:2px 8px;border-radius:4px;background:${c};color:#fff;font-size:12px;">${s}</span>`;
        }

        async function loadRooms() {
            const status = document.getElementById('roomsStatus');
            status.textContent = '載入中...';
            try {
                const r = await fetch(`${HOST_API}/rooms`);
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const rooms = await r.json();
                const list = document.getElementById('roomsList');
                const empty = document.getElementById('roomsEmpty');
                list.innerHTML = '';
                if (!rooms.length) {
                    empty.style.display = 'block';
                    status.textContent = '0 個房間';
                    return;
                }
                empty.style.display = 'none';
                status.textContent = `${rooms.length} 個房間`;
                for (const room of rooms) {
                    const tr = document.createElement('tr');
                    const mapName = await fetchMapName(room.map_id);
                    const created = (room.created_at || '').replace('T', ' ').replace(/\..+$/, '');
                    const canStop = !['stopped', 'crashed', 'failed'].includes(room.status);
                    tr.innerHTML = `
                        <td>${room.room_name || '-'}</td>
                        <td>${mapName}</td>
                        <td>${statusBadge(room.status)}</td>
                        <td><code>${room.assigned_ip || '-'}</code></td>
                        <td>${created}</td>
                        <td>${canStop ? `<button class="btn btn-danger" data-stop="${room.id}">停止</button>` : ''}</td>`;
                    list.appendChild(tr);
                }
                list.querySelectorAll('[data-stop]').forEach(btn => {
                    btn.addEventListener('click', () => stopRoom(btn.dataset.stop));
                });
            } catch (e) {
                status.textContent = '載入失敗：' + e.message;
            }
        }

        async function stopRoom(id) {
            if (!confirm('確認停止這個房間？')) return;
            try {
                const r = await fetch(`${HOST_API}/rooms/${id}`, { method: 'DELETE' });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                showToast('已停止');
                loadRooms();
            } catch (e) {
                showToast('停止失敗：' + e.message, 'error');
            }
        }

        document.getElementById('refreshRoomsBtn').addEventListener('click', loadRooms);

        // Initialize
        async function init() {
            const isAdmin = await checkAdminAuth();
            if (isAdmin) {
                loadUsers();
                loadMaps();
                loadRooms();
            }
        }

        init();
    </script>
</body>
</html>
